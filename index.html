<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОСББ: Космонавтів 52</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --space-blue: #0b2c5a; --space-gold: #ffb800; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 100%; max-width: 280px; height: auto; border-radius: 10px; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: #f8faff; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #d1d9e6; }
        .stat-card span { display: block; font-size: 22px; font-weight: bold; color: var(--space-blue); }
        input, textarea, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--space-blue); color: white; border: none; font-weight: bold; cursor: pointer; }
        .card { padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #eee; background: #fff; border-left: 8px solid #ccc; }
        .card.done { opacity: 0.6; text-decoration: line-through; border-left-color: #2ecc71 !important; }
        .chat-box { height: 160px; overflow-y: auto; background: #f0f2f5; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><img src="logo.jpg" alt="Логотип"></div>
    <div class="stats-bar">
        <div class="stat-card"><span id="totalCount">0</span><small>В РОБОТІ</small></div>
        <div class="stat-card"><span id="doneCount" style="color:#27ae60">0</span><small>ВИКОНАНО</small></div>
    </div>
    <input type="text" id="userName" placeholder="Прізвище та № квартири">
    <select id="category">
        <option value="Загальне">Загальне питання</option>
        <option value="Електрика">⚡ Електрика</option>
        <option value="Сантехніка">💧 Сантехніка</option>
    </select>
    <textarea id="userTask" rows="2" placeholder="Що сталося?"></textarea>
    <button onclick="addRequest()">ВІДПРАВИТИ</button>
    <h3>📋 Заявки</h3>
    <div id="requestList"></div>
    <h3>💬 Чат</h3>
    <div id="chatBox" class="chat-box"></div>
    <input type="text" id="chatMsg" placeholder="Повідомлення..."><button onclick="sendChat()">OK</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmQmxiQIRCP5psyfGyJFS5zh-wwez_wuQ",
        authDomain: "osbbkosmos52.firebaseapp.com",
        databaseURL: "https://osbbkosmos52-default-rtdb.firebaseio.com",
        projectId: "osbbkosmos52",
        storageBucket: "osbbkosmos52.firebasestorage.app",
        messagingSenderId: "608670954605",
        appId: "1:608670954605:web:c546048e8de34158a47b64"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addRequest() {
        const name = document.getElementById('userName').value;
        const task = document.getElementById('userTask').value;
        if (!name || !task) return alert("Заповніть поля!");
        db.ref('requests/').push({ name, task, category: document.getElementById('category').value, done: false });
        document.getElementById('userTask').value = '';
    }

    db.ref('requests/').on('value', (s) => {
        const list = document.getElementById('requestList'); list.innerHTML = "";
        let a = 0, d = 0;
        s.forEach(child => {
            const r = child.val(); r.done ? d++ : a++;
            const div = document.createElement('div');
            div.className = `card ${r.done ? 'done' : ''}`;
            div.innerHTML = `<strong>${r.name}</strong><p>${r.task}</p><button onclick="tDone('${child.key}',${r.done})">Статус</button><button onclick="del('${child.key}')">🗑</button>`;
            list.prepend(div);
        });
        document.getElementById('totalCount').innerText = a;
        document.getElementById('doneCount').innerText = d;
    });

    function tDone(id, cur) { db.ref('requests/' + id).update({ done: !cur }); }
    function del(id) { if(confirm("Видалити?")) db.ref('requests/' + id).remove(); }
    function sendChat() {
        const m = document.getElementById('chatMsg').value;
        if (m) db.ref('messages/').push({ text: m });
        document.getElementById('chatMsg').value = "";
    }
    db.ref('messages/').limitToLast(10).on('value', (s) => {
        const b = document.getElementById('chatBox'); b.innerHTML = "";
        s.forEach(c => { const d = document.createElement('div'); d.innerText = c.val().text; b.appendChild(d); });
    });
</script>
</body>
</html>
