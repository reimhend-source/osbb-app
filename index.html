<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОСББ Космонавтів 52</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-blue: #0b2c5a; --bg: #f0f4f8; --green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; transition: 0.3s; }
        .is-admin { background: #ddecff !important; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #f8fafc; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-box span { display: block; font-size: 20px; font-weight: bold; color: var(--main-blue); }
        input, textarea, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--main-blue); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
        .card { padding: 15px; margin-top: 10px; border-radius: 12px; border-left: 6px solid var(--main-blue); background: white; position: relative; }
        .card.done { border-left-color: var(--green); background: #f9fffb; opacity: 0.8; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .chat { height: 150px; overflow-y: auto; background: #f8fafc; padding: 10px; border-radius: 12px; margin-top: 15px; border: 1px solid #eee; font-size: 13px; }
        .btn-done { background: var(--green); padding: 5px; font-size: 11px; width: auto; margin-right: 5px; }
        .btn-del { background: #e74c3c; padding: 5px; font-size: 11px; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 15px;">
        <h1 style="color: var(--main-blue); margin: 0;">🏢 ОСББ 52</h1>
        <small>вул. Космонавтів, 52</small>
    </div>

    <div class="stats">
        <div class="stat-box"><span id="countActive" style="color:#e67e22">0</span>В роботі</div>
        <div class="stat-box"><span id="countDone" style="color:#27ae60">0</span>Виконано</div>
    </div>

    <input type="text" id="userName" placeholder="Прізвище та № квартири" oninput="checkAdmin(this.value)">
    <select id="category">
        <option>Загальне питання</option>
        <option>Електрика ⚡</option>
        <option>Водопостачання 💧</option>
        <option>Ліфт 🛗</option>
    </select>
    <textarea id="userTask" rows="3" placeholder="Опишіть проблему..."></textarea>
    <button onclick="addRequest()">ВІДПРАВИТИ ЗАЯВКУ</button>
    
    <div id="requestList"></div>
    <div class="chat" id="chatBox"></div>
    <div style="display:flex; gap:5px; margin-top:5px;"><input type="text" id="chatMsg" placeholder="Чат..."><button style="width:60px" onclick="sendChat()">OK</button></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmQmxiQIRCP5psyfGyJFS5zh-wwez_wuQ",
        authDomain: "osbbkosmos52.firebaseapp.com",
        databaseURL: "https://osbbkosmos52-default-rtdb.firebaseio.com",
        projectId: "osbbkosmos52",
        appId: "1:608670954605:web:c546048e8de34158a47b64"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAdmin(v) {
        if(v.toLowerCase().trim() === 'адмін52') document.body.classList.add('is-admin');
        else document.body.classList.remove('is-admin');
    }

    function addRequest() {
        const n = document.getElementById('userName').value;
        const t = document.getElementById('userTask').value;
        const c = document.getElementById('category').value;
        if(n && t) db.ref('requests/').push({ n, t, c, status: 'active' });
        document.getElementById('userTask').value = '';
    }

    db.ref('requests/').on('value', s => {
        const l = document.getElementById('requestList'); 
        let active = 0, done = 0;
        l.innerHTML = "<b>📋 Заявки:</b>";
        s.forEach(child => {
            const r = child.val();
            const isDone = r.status === 'done';
            if(isDone) done++; else active++;
            
            l.innerHTML += `
                <div class="card ${isDone ? 'done' : ''}">
                    <small style="color: grey;">${r.c || 'Загальне'} ${isDone ? '— ВИКОНАНО ✅' : ''}</small><br>
                    <b>${r.n}</b>: ${r.t}
                    <div class="admin-only" style="margin-top:10px">
                        ${!isDone ? `<button class="btn-done" onclick="db.ref('requests/${child.key}').update({status:'done'})">Готово ✅</button>` : ''}
                        <button class="btn-del" onclick="db.ref('requests/${child.key}').remove()">Видалити 🗑</button>
                    </div>
                </div>`;
        });
        document.getElementById('countActive').innerText = active;
        document.getElementById('countDone').innerText = done;
    });

    function sendChat() {
        const m = document.getElementById('chatMsg').value, n = document.getElementById('userName').value || "Сусід";
        if(m) db.ref('messages/').push({ msg: n + ": " + m });
        document.getElementById('chatMsg').value = "";
    }
    db.ref('messages/').limitToLast(15).on('value', s => {
        const b = document.getElementById('chatBox'); b.innerHTML = "";
        s.forEach(c => { b.innerHTML += `<div>${c.val().msg}</div>`; });
        b.scrollTop = b.scrollHeight;
    });
</script>
</body>
</html>
